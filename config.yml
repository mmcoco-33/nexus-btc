trading:
  symbol: "BTC_JPY"
  interval: "1hour"         # 1時間足
  lookback_candles: 200     # 学習に使う過去足数
  trade_amount_jpy: 10000   # 1回の注文金額（円）
  max_position: 1           # 最大ポジション数

risk:
  atr_mult: 2.0            # ATR × 2.0 で損切りライン
  trail_pct: 0.03          # トレーリングストップ3%
  max_daily_loss_pct: 0.05 # 日次最大損失5%

model:
  retrain_interval_hours: 24  # 24時間ごとに再学習
  signal_threshold: 0.38      # 38%以上の確信度で発注（押し目買い特化）

notification:
  line_enabled: false         # LINE通知（トークン設定後にtrue）
