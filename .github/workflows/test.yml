name: NEXUS-BTC Test (残高・価格確認)

on:
  workflow_dispatch:  # 手動実行のみ

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run test script
        env:
          GMO_API_KEY: ${{ secrets.GMO_API_KEY }}
          GMO_API_SECRET: ${{ secrets.GMO_API_SECRET }}
        run: python test_connection.py

      - name: Push results.json to repo
        run: |
          git config user.name "nexus-bot"
          git config user.email "bot@nexus"
          git add data/results.json
          git diff --staged --quiet || git commit -m "test: update results.json"
          git push origin main
