name: NEXUS-BTC Auto Trade

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分に実行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore models cache
        uses: actions/cache@v4
        with:
          path: models/
          key: nexus-models-v1   # 固定キー：毎日の再学習ワークフローが更新する
          restore-keys: nexus-models-

      - name: Run Bot（シグナル判定・注文のみ）
        env:
          GMO_API_KEY: ${{ secrets.GMO_API_KEY }}
          GMO_API_SECRET: ${{ secrets.GMO_API_SECRET }}
        run: python -m src.bot

      - name: Push results to repo
        run: |
          git config user.name "nexus-bot"
          git config user.email "bot@nexus"
          git add data/results.json results.json data/risk_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "trade: update results $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main || git pull --rebase origin main && git push origin main
